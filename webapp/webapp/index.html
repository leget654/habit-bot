<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Привычки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #0A0A0A;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }
  .app { padding: 16px 16px 90px; max-width: 480px; margin: 0 auto; }

  /* Header */
  .header { margin-bottom: 18px; }
  .header .title { font-size: 24px; font-weight: 700; }
  .header .subtitle { font-size: 13px; color: rgba(255,255,255,0.45); margin-top: 2px; }

  /* Screens */
  .screen { display: none; }
  .screen.on { display: block; animation: fadein .2s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Habit cards grid */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .card {
    border-radius: 18px; padding: 14px; min-height: 148px;
    display: flex; flex-direction: column; cursor: pointer; border: none;
    text-align: left; width: 100%; position: relative; transition: transform .1s;
  }
  .card:active { transform: scale(0.97); }
  .card.c0 { background: linear-gradient(160deg, #3a1f33, #1a0e18); }
  .card.c1 { background: linear-gradient(160deg, #3a2a1a, #1a130c); }
  .card.c2 { background: linear-gradient(160deg, #1a2638, #0d131c); }
  .card.c3 { background: linear-gradient(160deg, #1a3325, #0d1a13); }
  .card.c4 { background: linear-gradient(160deg, #2a1a3a, #150d1a); }
  .card.c5 { background: linear-gradient(160deg, #3a1a1a, #1a0d0d); }
  .crow { display: flex; align-items: center; gap: 6px; margin-bottom: auto; }
  .cicon { font-size: 18px; }
  .streak { margin-left: auto; display: flex; align-items: center; gap: 3px; font-size: 12px; opacity: .85; }
  .cname { font-size: 15px; font-weight: 600; margin: 10px 0 2px; line-height: 1.25; }
  .cfreq { color: rgba(255,255,255,0.45); font-size: 11px; margin-bottom: 10px; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 13px; height: 13px; border-radius: 4px; background: rgba(255,255,255,0.12); transition: background .2s; }
  .dot.on.c0 { background: #D4537E; }
  .dot.on.c1 { background: #EF9F27; }
  .dot.on.c2 { background: #378ADD; }
  .dot.on.c3 { background: #5DCAA5; }
  .dot.on.c4 { background: #B57EDC; }
  .dot.on.c5 { background: #E0615A; }
  .check {
    width: 27px; height: 27px; border-radius: 50%; background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s;
  }
  .check svg { width: 13px; height: 13px; stroke: rgba(255,255,255,0.6); }
  .check.done { background: #fff; }
  .check.done svg { stroke: #1a1a1a; }

  .empty { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); }
  .empty .big { font-size: 40px; margin-bottom: 12px; }

  .add-fab {
    position: fixed; bottom: 84px; right: 20px; width: 52px; height: 52px;
    border-radius: 50%; background: #fff; color: #000; border: none;
    font-size: 26px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.4); z-index: 10;
  }

  /* Stats screen */
  .sg { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .sc { background: #161616; border-radius: 14px; padding: 12px 14px; }
  .sl { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
  .sv { font-size: 22px; font-weight: 700; }
  .section-hdr { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
  .hmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 18px; }
  .hm { aspect-ratio: 1; border-radius: 4px; }
  .h0 { background: #1c1c1c; }
  .h1 { background: #2a4a3d; }
  .h2 { background: #3d8a6a; }
  .h3 { background: #5dcaa5; }
  .pb { margin-bottom: 12px; }
  .pbl { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .pbl .name { color: #fff; }
  .pbl .val { color: rgba(255,255,255,0.4); }
  .pbr { height: 7px; background: #1c1c1c; border-radius: 4px; overflow: hidden; }
  .pbf { height: 100%; border-radius: 4px; background: #5DCAA5; transition: width .4s ease; }

  /* Leaderboard */
  .lb { background: #161616; border-radius: 16px; overflow: hidden; }
  .lr { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 0.5px solid #232323; }
  .lr:last-child { border-bottom: none; }
  .lr.me { background: #1a2a22; }
  .lrank { font-size: 16px; width: 24px; text-align: center; }
  .lav { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .lname { flex: 1; font-size: 14px; font-weight: 500; }
  .lr.me .lname { color: #5DCAA5; }
  .lxp { font-size: 12px; color: rgba(255,255,255,0.5); }
  .lr.me .lxp { color: #5DCAA5; }
  .mycard { background: linear-gradient(135deg, #1a3325, #0d1a13); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
  .mytop { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .myav { width: 48px; height: 48px; border-radius: 50%; background: #5DCAA5; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: #0a0a0a; }
  .mylevel { font-size: 15px; font-weight: 600; }
  .myrank { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .myxpbar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .myxpfill { height: 100%; background: #5DCAA5; border-radius: 4px; }
  .myxptext { font-size: 11px; color: rgba(255,255,255,0.5); text-align: right; }

  /* Tab bar */
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; background: #0F0F0F;
    border-top: 0.5px solid #232323; display: flex; padding-bottom: env(safe-area-inset-bottom);
    z-index: 5;
  }
  .tab { flex: 1; padding: 10px 0 8px; text-align: center; background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.4); font-size: 11px; }
  .tab.on { color: #fff; }
  .tab .ic { font-size: 20px; display: block; margin-bottom: 2px; }

  /* Modal for add habit */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; z-index: 20; }
  .modal-overlay.on { display: flex; }
  .modal { background: #141414; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 80vh; overflow-y: auto; animation: slideup .25s ease; }
  @keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h3 { font-size: 18px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 6px; }
  .field input { width: 100%; background: #1f1f1f; border: 0.5px solid #2c2c2c; border-radius: 10px; padding: 12px; color: #fff; font-size: 15px; }
  .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .emoji-opt { background: #1f1f1f; border: 1.5px solid transparent; border-radius: 10px; padding: 10px 0; text-align: center; font-size: 18px; cursor: pointer; }
  .emoji-opt.sel { border-color: #5DCAA5; }
  .btn-primary { width: 100%; background: #5DCAA5; color: #0a0a0a; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-secondary { width: 100%; background: transparent; color: rgba(255,255,255,0.5); border: none; padding: 12px; font-size: 14px; cursor: pointer; }

  .loading { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="title" id="headerTitle">Мои привычки</div>
    <div class="subtitle" id="headerSubtitle">Загрузка...</div>
  </div>

  <!-- Screen: Habits -->
  <div class="screen on" id="screen-habits">
    <div class="grid" id="habitsGrid"></div>
    <div class="empty" id="habitsEmpty" style="display:none">
      <div class="big">🎯</div>
      <div>Пока нет привычек.<br>Нажми + чтобы добавить первую</div>
    </div>
  </div>

  <!-- Screen: Stats -->
  <div class="screen" id="screen-stats">
    <div class="sg">
      <div class="sc"><div class="sl">Выполнено всего</div><div class="sv" id="statCompleted">—</div></div>
      <div class="sc"><div class="sl">Лучший стрик</div><div class="sv" id="statBestStreak">—</div></div>
      <div class="sc"><div class="sl">Уровень</div><div class="sv" id="statLevel" style="font-size:15px">—</div></div>
      <div class="sc"><div class="sl">XP всего</div><div class="sv" id="statXP">—</div></div>
    </div>
    <div class="section-hdr">Активность за месяц</div>
    <div class="hmap" id="heatmap"></div>
    <div class="section-hdr">Прогресс по целям</div>
    <div id="goalsList"></div>
  </div>

  <!-- Screen: Leaderboard -->
  <div class="screen" id="screen-leaderboard">
    <div class="mycard">
      <div class="mytop">
        <div class="myav" id="myAvatar">Я</div>
        <div>
          <div class="mylevel" id="myLevel">—</div>
          <div class="myrank" id="myRank">—</div>
        </div>
      </div>
      <div class="myxpbar"><div class="myxpfill" id="myXpFill" style="width:0%"></div></div>
      <div class="myxptext" id="myXpText">—</div>
    </div>
    <div class="section-hdr">Топ игроков</div>
    <div class="lb" id="leaderboardList"></div>
  </div>

</div>

<button class="add-fab" id="addFab" onclick="openAddModal()">+</button>

<div class="tabbar">
  <button class="tab on" id="tab-habits" onclick="switchScreen('habits')">
    <span class="ic">✅</span>Привычки
  </button>
  <button class="tab" id="tab-stats" onclick="switchScreen('stats')">
    <span class="ic">📊</span>Статистика
  </button>
  <button class="tab" id="tab-leaderboard" onclick="switchScreen('leaderboard')">
    <span class="ic">🏆</span>Рейтинг
  </button>
</div>

<!-- Add habit modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Новая привычка</h3>
    <div class="field">
      <label>Название</label>
      <input type="text" id="newHabitName" placeholder="Например: Зарядка">
    </div>
    <div class="field">
      <label>Эмодзи</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <button class="btn-primary" onclick="submitNewHabit()">Создать</button>
    <button class="btn-secondary" onclick="closeAddModal()">Отмена</button>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const API_BASE = window.location.origin;
const initData = tg?.initData || '';
console.log('Telegram WebApp available:', !!tg);
console.log('initData length:', initData.length);
if (!initData) {
  document.getElementById('headerSubtitle').textContent = '⚠️ Открой через кнопку в боте, не в браузере';
}

let state = {
  habits: [],
  stats: null,
  leaderboard: null,
  selectedEmoji: '💪'
};

const EMOJI_OPTIONS = ['💪','🏃','📚','💧','🧘','🥗','😴','🎯','✍️','🎵','🌅','🚭'];
const COLOR_CLASSES = ['c0','c1','c2','c3','c4','c5'];

function colorFor(idx) { return COLOR_CLASSES[idx % COLOR_CLASSES.length]; }

async function apiCall(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'X-Telegram-Init-Data': initData }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API_BASE}${endpoint}`, opts);
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

async function loadHabits() {
  try {
    const data = await apiCall('/api/habits');
    state.habits = data.habits || [];
    renderHabits();
    document.getElementById('headerSubtitle').textContent = `${data.today_done || 0} из ${state.habits.length} выполнено сегодня`;
  } catch (e) {
    console.error(e);
    document.getElementById('headerSubtitle').textContent = 'Ошибка загрузки';
  }
}

function renderHabits() {
  const grid = document.getElementById('habitsGrid');
  const empty = document.getElementById('habitsEmpty');
  if (state.habits.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = state.habits.map((h, idx) => {
    const c = colorFor(idx);
    const dots = h.week.map(done => `<div class="dot ${done ? 'on ' + c : ''}"></div>`).join('');
    return `
      <button class="card ${c}" onclick="toggleHabit(${h.id}, this)">
        <div class="crow">
          <span class="cicon">${h.emoji}</span>
          <span class="streak">🔥 ${h.streak}</span>
          <div class="check ${h.done_today ? 'done' : ''}">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </div>
        </div>
        <div class="cname">${h.name}</div>
        <div class="cfreq">${h.goal_text || 'каждый день'}</div>
        <div class="dots">${dots}</div>
      </button>
    `;
  }).join('');
}

async function toggleHabit(habitId, cardEl) {
  cardEl.style.opacity = '.7';
  try {
    const result = await apiCall(`/api/habits/${habitId}/toggle`, 'POST');
    await loadHabits();
    if (result.xp_earned) {
      tg?.HapticFeedback?.notificationOccurred('success');
    }
  } catch (e) {
    console.error(e);
  }
  cardEl.style.opacity = '';
}

async function loadStats() {
  try {
    const data = await apiCall('/api/stats');
    state.stats = data;
    document.getElementById('statCompleted').textContent = data.total_completed ?? '—';
    document.getElementById('statBestStreak').textContent = data.best_streak ?? '—';
    document.getElementById('statLevel').textContent = data.level_name ?? '—';
    document.getElementById('statXP').textContent = data.xp ?? '—';

    const hmap = document.getElementById('heatmap');
    hmap.innerHTML = (data.heatmap || []).map(level => `<div class="hm h${level}"></div>`).join('');

    const goalsList = document.getElementById('goalsList');
    goalsList.innerHTML = (data.goals || []).map(g => {
      const pct = Math.min(100, Math.round((g.done / g.goal) * 100));
      return `
        <div class="pb">
          <div class="pbl"><span class="name">${g.emoji} ${g.name}</span><span class="val">${g.done}/${g.goal}</span></div>
          <div class="pbr"><div class="pbf" style="width:${pct}%"></div></div>
        </div>
      `;
    }).join('') || '<div style="color:rgba(255,255,255,0.3);font-size:13px">Нет привычек с целями на месяц</div>';
  } catch (e) {
    console.error(e);
  }
}

async function loadLeaderboard() {
  try {
    const data = await apiCall('/api/leaderboard');
    document.getElementById('myAvatar').textContent = (data.me.name || 'Я')[0].toUpperCase();
    document.getElementById('myLevel').textContent = data.me.level_name;
    document.getElementById('myRank').textContent = `#${data.me.rank} в рейтинге`;
    document.getElementById('myXpFill').style.width = `${data.me.progress_pct}%`;
    document.getElementById('myXpText').textContent = data.me.next_xp
      ? `${data.me.xp} / ${data.me.next_xp} XP`
      : `${data.me.xp} XP · максимальный уровень`;

    const list = document.getElementById('leaderboardList');
    list.innerHTML = (data.top || []).map((u, idx) => {
      const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx + 1}.`;
      const isMe = u.is_me ? 'me' : '';
      const initials = (u.name || '?')[0].toUpperCase();
      return `
        <div class="lr ${isMe}">
          <div class="lrank">${medal}</div>
          <div class="lav" style="background:${isMe ? '#5DCAA5' : '#2a2a2a'};color:${isMe ? '#0a0a0a' : '#888'}">${initials}</div>
          <div class="lname">${u.name}${u.is_me ? ' (ты)' : ''}</div>
          <div class="lxp">${u.xp} ⚡</div>
        </div>
      `;
    }).join('');
  } catch (e) {
    console.error(e);
  }
}

function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById(`screen-${name}`).classList.add('on');
  document.getElementById(`tab-${name}`).classList.add('on');
  document.getElementById('addFab').style.display = name === 'habits' ? 'flex' : 'none';

  const titles = { habits: 'Мои привычки', stats: 'Статистика', leaderboard: 'Рейтинг' };
  document.getElementById('headerTitle').textContent = titles[name];

  if (name === 'stats') loadStats();
  if (name === 'leaderboard') loadLeaderboard();
  if (name === 'habits') document.getElementById('headerSubtitle').textContent = 'Загрузка...';
}

function openAddModal() {
  document.getElementById('addModal').classList.add('on');
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = EMOJI_OPTIONS.map(e =>
    `<div class="emoji-opt ${e === state.selectedEmoji ? 'sel' : ''}" onclick="selectEmoji('${e}')">${e}</div>`
  ).join('');
}
function closeAddModal() {
  document.getElementById('addModal').classList.remove('on');
  document.getElementById('newHabitName').value = '';
}
function selectEmoji(e) {
  state.selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('sel', el.textContent === e));
}
async function submitNewHabit() {
  const name = document.getElementById('newHabitName').value.trim();
  if (!name) { tg?.HapticFeedback?.notificationOccurred('error'); return; }
  try {
    await apiCall('/api/habits', 'POST', { name, emoji: state.selectedEmoji });
    closeAddModal();
    await loadHabits();
    tg?.HapticFeedback?.notificationOccurred('success');
  } catch (e) {
    console.error(e);
  }
}

// Init
loadHabits();
</script>

</body>
</html>
